<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Placeholder: Melbourne small-business interior in morning light">
  <defs>
    <radialGradient id="hLight" cx="74%" cy="22%" r="70%">
      <stop offset="0%" stop-color="#f4e6c6"/>
      <stop offset="38%" stop-color="#cdab78"/>
      <stop offset="100%" stop-color="#3a2c20"/>
    </radialGradient>
    <linearGradient id="hFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a5238"/>
      <stop offset="100%" stop-color="#2a2017"/>
    </linearGradient>
    <linearGradient id="hWall" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5c4a35"/>
      <stop offset="100%" stop-color="#8f7048"/>
    </linearGradient>
    <filter id="hGrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- room -->
  <rect width="1600" height="1000" fill="url(#hWall)"/>
  <rect width="1600" height="1000" fill="url(#hLight)" opacity="0.92"/>
  <polygon points="0,640 1600,520 1600,1000 0,1000" fill="url(#hFloor)"/>

  <!-- window light upper-right -->
  <g opacity="0.5" fill="#f6ecd2">
    <rect x="1180" y="60" width="150" height="360" rx="4"/>
    <rect x="1352" y="60" width="150" height="360" rx="4"/>
  </g>
  <g stroke="#2c2118" stroke-width="6" opacity="0.45">
    <line x1="1170" y1="60" x2="1170" y2="430"/>
    <line x1="1340" y1="60" x2="1340" y2="430"/>
    <line x1="1512" y1="60" x2="1512" y2="430"/>
  </g>

  <!-- furniture / plant silhouettes -->
  <rect x="150" y="600" width="520" height="34" rx="6" fill="#241b13" opacity="0.75"/>
  <rect x="190" y="634" width="40" height="150" fill="#241b13" opacity="0.7"/>
  <rect x="590" y="634" width="40" height="150" fill="#241b13" opacity="0.7"/>
  <g fill="#1d2a1e" opacity="0.8">
    <path d="M980 700 C 940 560 1010 470 1000 700 Z"/>
    <path d="M1000 700 C 1040 540 1110 500 1060 700 Z"/>
    <path d="M1000 700 C 1000 590 980 560 1020 700 Z"/>
  </g>
  <rect x="960" y="700" width="100" height="120" rx="8" fill="#3a2c1e" opacity="0.85"/>

  <rect width="1600" height="1000" filter="url(#hGrain)" opacity="0.5"/>
</svg>
