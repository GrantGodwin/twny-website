<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Placeholder: independent shopfront counter in warm daylight">
  <defs>
    <linearGradient id="cBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2733"/>
      <stop offset="55%" stop-color="#33424f"/>
      <stop offset="100%" stop-color="#10161c"/>
    </linearGradient>
    <radialGradient id="cGlow" cx="50%" cy="34%" r="60%">
      <stop offset="0%" stop-color="#e8c79a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e8c79a" stop-opacity="0"/>
    </radialGradient>
    <filter id="cGrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#cBg)"/>
  <rect width="1600" height="1000" fill="url(#cGlow)"/>

  <!-- glazing / shopfront frame -->
  <g stroke="#0c1116" stroke-width="10" opacity="0.6" fill="none">
    <rect x="160" y="120" width="1280" height="560"/>
    <line x1="586" y1="120" x2="586" y2="680"/>
    <line x1="1013" y1="120" x2="1013" y2="680"/>
    <line x1="160" y1="400" x2="1440" y2="400"/>
  </g>
  <g fill="#e8c79a" opacity="0.12">
    <rect x="170" y="130" width="406" height="260"/>
    <rect x="1023" y="410" width="406" height="260"/>
  </g>

  <!-- counter -->
  <rect x="0" y="700" width="1600" height="300" fill="#171d24"/>
  <rect x="0" y="700" width="1600" height="22" fill="#2c3742"/>

  <rect width="1600" height="1000" filter="url(#cGrain)" opacity="0.5"/>
</svg>
